<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figuras em css</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>

    .forma {
        /* basicamente um triangulo com a 
        border bottom sendo a base, ai ele fica 
        cortado usando o width*/
        width: 120px;
        height: 10px;
        border-left: 75px solid transparent;
        border-right: 75px solid transparent;
        border-bottom: 100px solid #ff0303;
    }

    h1 {
        border: 100px;
    }
</style>

<body>
    <h1>trapézio</h1>
    <div class="forma"></div>
</body>

</html>
