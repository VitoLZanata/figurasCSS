<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figuras em css</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    .telhado {
        /* aqui um triangulo */
        width: 0px;
        height: 0px;
        border-left: 135px solid transparent;
        border-right: 135px solid transparent;
        border-bottom: 130px solid #000;
    }

    .forma {
        /* Aqui eu faço um trapézio, basicamente
        um triangulo pra baixo com a border top sendo
        a base, ai ele fica cortado usando o width*/
        width: 120px;
        height: 10px;
        border-left: 75px solid transparent;
        border-right: 75px solid transparent;
        border-top: 100px solid #ff0303;
    }

    h1 {
        border: 100px;
    }
</style>

<body>
    <h1>Pentagono</h1>
    <div class="telhado"></div>
    <div class="forma"></div>
</body>

</html>
